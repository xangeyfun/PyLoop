{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="main-container">
<section class="auth-section">
    <h2>Register to PyLoop</h2>
    <form action="/api/register" method="POST" class="auth-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required minlength="3" placeholder="Choose a username">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6" placeholder="Choose a password">
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
    </form>
    <p class="auth-link">Already have an account? <a href="/login">Login here</a>.</p>
</section>
</div>
{% endblock %}
